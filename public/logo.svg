<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <defs>
    <linearGradient id="bolt-grad" x1="60" y1="240" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#312e81"/>
      <stop offset="45%"  stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bolt-grad2" x1="80" y1="240" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3730a3"/>
      <stop offset="50%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Back bolt (slightly offset for depth effect) -->
  <path
    d="M 125 5 L 55 115 L 100 110 L 70 235 L 175 100 L 125 108 Z"
    fill="url(#bolt-grad2)"
    opacity="0.55"
    filter="url(#glow)"
  />

  <!-- Main bolt -->
  <path
    d="M 115 8 L 45 118 L 92 112 L 60 232 L 168 98 L 115 104 Z"
    fill="url(#bolt-grad)"
  />
</svg>
